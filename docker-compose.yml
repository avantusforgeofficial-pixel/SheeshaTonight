version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sheesha-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-sheesha}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sheesha123}
      POSTGRES_DB: ${DB_NAME:-sheesha_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sheesha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sheesha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sheesha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sheesha-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sheesha-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-sheesha}:${DB_PASSWORD:-sheesha123}@postgres:5432/${DB_NAME:-sheesha_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRE: 7d
      JWT_REFRESH_EXPIRE: 30d
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sheesha-network
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    command: npm run dev

  admin-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin-web
    container_name: sheesha-admin-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sheesha-network
    volumes:
      - ./apps/admin-web:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres-data:
  redis-data:

networks:
  sheesha-network:
    driver: bridge
